<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-brand">
      <div class="mark">NV</div>
      <h2>Crear cuenta</h2>
      <p class="muted small">Registrate para personalizar tu experiencia en NexoVeraz.</p>
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-field">
        <label for="username">Usuario</label>
        <input id="username" type="text" name="username" [(ngModel)]="username" autocomplete="username" />
      </div>
      <div class="form-field">
        <label for="displayName">Nombre para mostrar</label>
        <input id="displayName" type="text" name="displayName" [(ngModel)]="displayName" autocomplete="name" />
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email" autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" [(ngModel)]="password" autocomplete="new-password" />
      </div>
      <div class="form-field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input id="confirmPassword" type="password" name="confirmPassword" [(ngModel)]="confirmPassword" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading()">
        {{ loading() ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth-switch muted">
      ¿Ya tenés cuenta? <a routerLink="/login">Ingresar</a>
    </p>
  </div>
</div>
