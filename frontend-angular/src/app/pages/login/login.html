<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-brand">
      <div class="mark">NV</div>
      <h2>Ingresar</h2>
      <p class="muted small">Accedé a tu cuenta de NexoVeraz.</p>
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email" autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" [(ngModel)]="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>

    <p class="auth-switch muted">
      ¿No tenés cuenta? <a routerLink="/register">Crear cuenta</a>
    </p>

    <div class="demo-hint">
      <div class="muted tiny">
        Cuenta demo · <span class="mono">demo&#64;nexoveraz.local</span> / <span class="mono">123456</span>
      </div>
      <button type="button" class="btn btn-ghost demo-btn" (click)="useDemoAccount()">
        Usar cuenta demo
      </button>
    </div>
  </div>
</div>
