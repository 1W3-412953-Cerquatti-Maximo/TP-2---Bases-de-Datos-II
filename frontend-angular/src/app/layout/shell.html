<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">NV</div>
      <div>
        <div class="brand-name">NexoVeraz</div>
        <div class="brand-sub">Anti Fake News</div>
      </div>
    </div>

    <nav>
      <a routerLink="/evaluate-link" routerLinkActive="active" class="nav-primary">
        <span class="icon">⌁</span> Evaluar link
      </a>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">▣</span> Dashboard
      </a>
      <a routerLink="/news" routerLinkActive="active">
        <span class="icon">▤</span> Noticias
      </a>
      <a routerLink="/sources" routerLinkActive="active">
        <span class="icon">⟁</span> Fuentes
      </a>
      <a routerLink="/reports" routerLinkActive="active">
        <span class="icon">⌬</span> Reportes
      </a>
    </nav>

    <div class="tag">
      <small class="muted">Noticias trazables.</small>
      <small class="muted">Riesgos explicables.</small>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="slogan">Noticias trazables. Riesgos explicables.</div>
      <div class="topbar-right">
        <button type="button" class="theme-toggle" (click)="toggleTheme()" aria-label="Cambiar tema">
          {{ theme() === 'dark' ? '☀ Claro' : '☾ Oscuro' }}
        </button>

        @if (auth.isAuthenticated()) {
          <a routerLink="/profile" class="auth-link" routerLinkActive="active">
            {{ auth.currentUser()?.displayName }}
          </a>
        } @else {
          <a routerLink="/login" class="auth-link" routerLinkActive="active">Ingresar</a>
          <a routerLink="/register" class="auth-link auth-link-primary" routerLinkActive="active">Crear cuenta</a>
        }

        <span class="status mono small">
          <span class="dot"></span> localhost:8080
        </span>
      </div>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
