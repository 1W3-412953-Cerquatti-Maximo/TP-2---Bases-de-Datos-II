neo4j.uri=${NEO4J_URI:neo4j://127.0.0.1:7687}
neo4j.user=${NEO4J_USER:neo4j}
neo4j.password=${NEO4J_PASSWORD}
neo4j.database=${NEO4J_DATABASE:antifakenews}

server.port=8080
spring.application.name=antifakenews-backend

# --- Asistente IA (modular y opcional) ---
# enabled=false  -> IA apagada (comportamiento por defecto)
# provider=disabled | mock | external | anthropic
#   - disabled/mock/external: aplican al análisis de noticias (AiAnalysisPort)
#   - mock/anthropic: aplican a la prueba de conexión (AiProvider, /api/ai/health)
ai.enabled=${AI_ENABLED:false}
ai.provider=${AI_PROVIDER:disabled}
ai.external.api-key=${AI_EXTERNAL_API_KEY:}
ai.external.endpoint=${AI_EXTERNAL_ENDPOINT:}

# --- IA real: proveedor Anthropic (Fase IA 1: solo prueba de conexión) ---
# La API key se lee de la variable de entorno ANTHROPIC_API_KEY o del archivo
# .env.API_KEY en la raíz (cargado por EnvFileEnvironmentPostProcessor).
# NUNCA hardcodear la key acá ni exponerla al frontend.
ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
ai.anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5}
ai.anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com}
ai.anthropic.version=${ANTHROPIC_VERSION:2023-06-01}
ai.anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:512}
ai.anthropic.timeout-seconds=${ANTHROPIC_TIMEOUT_SECONDS:25}
# Tokens para el análisis del Asistente IA (más alto que el health-check).
ai.anthropic.analysis-max-tokens=${ANTHROPIC_ANALYSIS_MAX_TOKENS:1600}
# Fase IA 3: enriquecimiento estructurado (salida más larga + límite de texto enviado).
ai.anthropic.enrichment-max-tokens=${ANTHROPIC_ENRICHMENT_MAX_TOKENS:4000}
ai.anthropic.enrichment-content-limit=${ANTHROPIC_ENRICHMENT_CONTENT_LIMIT:16000}

# --- Seed demo opcional ---
# true (default): al arrancar crea/actualiza la cuenta demo y le vincula las noticias sin dueño.
demo.seed.enabled=${DEMO_SEED_ENABLED:true}
